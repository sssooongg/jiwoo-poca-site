<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍓 지우 포카 🍓</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #007bff;
            --secondary: #ff4757;
            --bg: #f8f9fa;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
            --border: #edf2f7;
            --grid-cols: 2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg); color: #2d3436; line-height: 1.6;
            touch-action: pan-x pan-y; -webkit-text-size-adjust: none; overflow-x: hidden;
        }

        /* 메뉴 열림 상태에서 뒤쪽 배경 고정 */
        body.menu-open { overflow: hidden; position: fixed; width: 100%; height: 100%; }

        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background-color: #fff; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.05); }
        
        /* [수정] 헤더 완전 고정 및 z-index 최상위 유지 */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; height: 57px; 
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 500px;
            z-index: 3500;
            background-color: #fff; border-bottom: 1px solid var(--border);
        }
        .logo { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 20px; font-weight: 700; color: #1e272e; cursor: pointer; white-space: nowrap; }
        .icon-btn { background: none; border: none; cursor: pointer; color: #485460; font-size: 1.2rem; padding: 8px; position: relative; z-index: 3100; }

        /* 헤더가 고정되었으므로 컨텐츠 영역 상단에 여백 추가 */
        .main-content { padding: 77px 20px 20px; min-height: 80vh; }

        .toc-menu {
            position: fixed; top: 57px; left: 50%; transform: translateX(-50%);
            max-width: 500px; width: 100%; height: calc(100vh - 57px); z-index: 2500;
            overflow-y: auto; background-color: #fff; display: none;
            padding-bottom: 100px;
        }
        .menu-group { border-bottom: 1px solid var(--border); padding: 5px 0; }
        .menu-parent-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
        .menu-parent-text { font-size: 1.05rem; font-weight: 700; color: #2d3436; cursor: pointer; flex: 1; }
        .toggle-btn { padding: 10px; cursor: pointer; color: #b2bec3; transition: 0.3s; }
        .toggle-btn.active { transform: rotate(180deg); color: var(--primary); }
        .menu-child-list { list-style: none; padding: 5px 20px 15px; display: none; flex-wrap: wrap; gap: 8px; }
        .menu-child-item { font-size: 0.8rem; color: #636e72; cursor: pointer; background: #f1f2f6; padding: 6px 14px; border-radius: 20px; }

        .welcome { text-align: center; margin-top: 80px; }
        .welcome p { color: #a4b0be; font-size: 0.95rem; }
        .bookmark-main-btn { 
            margin-top: 25px; padding: 12px 30px; border: none; background: var(--secondary); 
            color: #fff; border-radius: 50px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        .search-bar-container { display: none; margin-bottom: 20px; }
        .search-input-wrapper { position: relative; display: flex; align-items: center; }
        .search-input-wrapper i { position: absolute; left: 15px; color: #a4b0be; font-size: 0.9rem; }
        .search-input-wrapper input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid var(--border); border-radius: 12px; outline: none; background: #f9f9f9; }

        #result-area { display: none; }
        .album-title { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; }
        .tab-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .tab-btn { padding: 7px 14px; border: 1px solid var(--border); background: #fff; border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 500; color: #7f8c8d; }
        .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .sub-filter-group { background: #f9f9f9; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .filter-label { font-size: 0.75rem; color: #a4b0be; margin-bottom: 8px; font-weight: 700; }
        .filter-btns { display: flex; flex-wrap: wrap; gap: 6px; }
        .f-btn { flex: 1; min-width: 80px; padding: 7px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 0.7rem; cursor: pointer; color: #636e72; }
        .f-btn.active { background: #2d3436; color: #fff; border-color: #2d3436; }

        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        #tab-label { font-size: 0.85rem; font-weight: 700; color: #b2bec3; }
        #grid-slider-container { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .zoom-slider { -webkit-appearance: none; width: 80px; height: 4px; background: #dfe6e9; border-radius: 2px; outline: none; }
        .zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--primary); border-radius: 50%; cursor: pointer; }

        .card-grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 10px; margin-top: 10px; align-items: start; }
        .card-item { background: #fff; border-radius: 12px; border: 1px solid var(--border); padding: 8px; display: flex; flex-direction: column; position: relative; box-shadow: var(--card-shadow); transition: transform 0.2s; }
        .card-image-wrapper { width: 100%; aspect-ratio: 5.5 / 8.5; border-radius: 8px; overflow: hidden; background: #f1f2f6; }
        .card-image-wrapper img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        .card-name { 
            font-size: 0.8rem; font-weight: 700; color: #2d3436; margin: 8px 0 2px; text-align: center; 
            min-height: 2.8em; line-height: 1.4; word-break: keep-all; display: flex; align-items: center; justify-content: center;
        }
        .grid-3-plus .card-name { font-size: 0.6rem; min-height: 3em; }

        .card-bookmark-btn { 
            position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.8); 
            border: none; cursor: pointer; font-size: 1.1rem; color: #dfe6e9; 
            z-index: 5; width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .card-bookmark-btn.active { color: var(--secondary); background: #fff; }

        .modal { display: none; position: fixed; z-index: 4000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { max-width: 90%; max-height: 75%; border-radius: 15px; animation: zoomIn 0.3s; cursor: pointer; }
        .modal-controls { position: absolute; top: 20px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 4200; }
        .modal-icon-btn { background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.8); color: white; font-size: 1.5rem; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-icon-btn.active { color: var(--secondary); border-color: var(--secondary); }
        .modal-caption { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 30px; font-size: 0.9rem; z-index: 4200; white-space: nowrap; }
        
        @keyframes highlight-glow { 0% { transform: scale(1); } 50% { transform: scale(1.08); box-shadow: 0 0 20px var(--primary); border-color: var(--primary); } 100% { transform: scale(1); } }
        .highlight-card { animation: highlight-glow 0.8s ease-in-out 2; z-index: 10; position: relative; border: 2px solid var(--primary) !important; }
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <button id="menu-toggle" class="icon-btn"><i class="fas fa-bars"></i></button>
        <h1 class="logo" onclick="location.reload()">🍓 지우 포카 🍓</h1>
        <button id="search-toggle" class="icon-btn"><i class="fas fa-search"></i></button>
    </header>

    <nav id="toc-menu" class="toc-menu"><div id="menu-list-container"></div></nav>

    <main class="main-content" id="main-view">
        <div id="search-bar" class="search-bar-container">
            <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="이름 또는 특징 검색...">
            </div>
        </div>

        <div id="welcome-view" class="welcome">
            <p>메뉴를 선택해 포토카드를 확인하세요</p>
            <button class="bookmark-main-btn" onclick="showBookmarks()">
                <i class="fas fa-heart"></i> 내 북마크 보기
            </button>
        </div>

        <div id="result-area">
            <h2 id="display-album-name" class="album-title"></h2>
            <div id="tab-wrapper" class="tab-container"></div>
            
            <div id="version-filter" class="sub-filter-group" style="display:none;">
                <p class="filter-label">VERSION</p>
                <div id="version-btn-wrapper" class="filter-btns"></div>
            </div>
            <div id="fansign-filter" class="sub-filter-group" style="display:none;">
                <p class="filter-label">FANSIGN TYPE</p>
                <div id="fansign-btn-wrapper" class="filter-btns"></div>
            </div>

            <div class="info-row">
                <div id="tab-label"></div>
                <div id="grid-slider-container" style="display:none;">
                    <i class="fas fa-minus" style="font-size: 0.7rem; color: #b2bec3;"></i>
                    <input type="range" id="grid-range" class="zoom-slider" min="2" max="4" value="2" step="1">
                    <i class="fas fa-plus" style="font-size: 0.7rem; color: #b2bec3;"></i>
                </div>
            </div>
            <div class="card-grid" id="pc-list"></div>
        </div>
    </main>
</div>

<div id="image-modal" class="modal" onclick="closeModal(event)">
    <div class="modal-controls">
        <button id="modal-bookmark-btn" class="modal-icon-btn"><i class="far fa-heart"></i></button>
        <button class="modal-icon-btn" onclick="closeModal(event)"><i class="fas fa-times"></i></button>
    </div>
    <img id="modal-img" class="modal-content" onclick="handleModalImgClick(event)">
    <div id="modal-pc-name" class="modal-caption"></div>
</div>

]; // [데이터 영역]

    let bookmarks = JSON.parse(localStorage.getItem('jiwoo_bookmarks')) || [];
    let currentAlbum = '', currentTab = '', currentVer = '전체', currentFsType = '전체', currentViewingId = null;
    let lastTapTime = 0; 
    let lastModalTapTime = 0; 

    const pcList = document.getElementById('pc-list');
    const searchInput = document.getElementById('search-input');
    const gridRange = document.getElementById('grid-range');

    const menuStructure = [
        { name: '전체', children: [] },
        { name: 'The Chase', children: ['앨범 포카', '예판 특전', '럭키드로우', '팬싸 특전'] },
        { name: 'STYLE', children: ['팬싸 특전', '럭키드로우', '기타'] },
        { name: 'FOCUS', children: ['앨범 포카', '예판 특전', '럭키드로우', '팬싸 특전'] },
        { name: 'RUDE!', children: ['럭키드로우', '기타'] },
        { name: '유닛 포카', children: ['The Chase', 'STYLE', 'FOCUS', 'RUDE!', '기타'] },
        { name: 'MD 포카', children: ['The Chase', 'STYLE', 'FOCUS', '1st ANNIVERSARY', 'Four Hearts Club', '티니핑', '시즌그리팅', 'Hearts2House', '응원봉', 'BIRTHDAY'] },
        { name: '기타', children: ['메가 커피', 'SUPER STAR SM', 'SMT 25', 'BARENBLISS', '2aN', 'scarlett', 'TELECA 2025 KPOP ROOKIE', 'SM 30th', '국민은행', 'LILY BROWN'] }
    ];

    function renderCards() {
        const keyword = searchInput.value.trim().toLowerCase();
        let filtered = pcData.filter(pc => {
            if (keyword !== '') {
                return pc.name.toLowerCase().includes(keyword) || (pc.info && pc.info.toLowerCase().includes(keyword));
            }
            const mAlb = currentAlbum === '전체' || pc.album === currentAlbum;
            const mTab = currentTab === '전체' || pc.category === currentTab;
            const mVer = currentVer === '전체' || pc.version === currentVer;
            const mFs = currentFsType === '전체' || pc.fsType === currentFsType;
            return mAlb && mTab && mVer && mFs;
        });

        filtered.sort((a, b) => {
            const getAlbumPriority = (pc) => {
                const name = pc.name.toUpperCase();
                if (name.includes('THE CHASE')) return 1;
                if (name.includes('STYLE')) return 2;
                if (name.includes('FOCUS')) return 3;
                if (name.includes('RUDE!')) return 4;
                const albumOrder = { 'The Chase': 1, 'STYLE': 2, 'FOCUS': 3, 'RUDE!': 4, '유닛 포카': 5, 'MD 포카': 6, '기타': 7 };
                return albumOrder[pc.album] || 99;
            };
            const albA = getAlbumPriority(a);
            const albB = getAlbumPriority(b);
            if (albA !== albB) return albA - albB;

            const catOrder = { '앨범 포카': 1, '예판 특전': 2, '럭키드로우': 3, '팬싸 특전': 4, '기타': 5 };
            const cA = catOrder[a.category] || 99;
            const cB = catOrder[b.category] || 99;
            if (cA !== cB) return cA - cB;

            const cleanA = a.name.replace(/폴라/g, '').replace(/\s+/g, ' ').trim();
            const cleanB = b.name.replace(/폴라/g, '').replace(/\s+/g, ' ').trim();
            if (cleanA === cleanB) return a.name.includes('폴라') - b.name.includes('폴라');

            const getType = (str) => {
                if (/[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/.test(str[0])) return 1;
                if (/[0-9]/.test(str[0])) return 2;
                if (/[a-zA-Z]/.test(str[0])) return 3;
                return 4;
            };
            const typeA = getType(cleanA);
            const typeB = getType(cleanB);
            if (typeA !== typeB) return typeA - typeB;
            return cleanA.localeCompare(cleanB, 'ko', { numeric: true });
        });

        if (keyword !== '') {
            document.getElementById('display-album-name').style.display = "none";
            document.getElementById('tab-wrapper').style.display = "none";
            document.getElementById('version-filter').style.display = "none";
            document.getElementById('fansign-filter').style.display = "none";
        } else {
            document.getElementById('display-album-name').style.display = "block";
            document.getElementById('display-album-name').innerText = currentAlbum || "전체 포카";
            document.getElementById('tab-wrapper').style.display = "flex";
        }

        document.getElementById('grid-slider-container').style.display = (keyword || currentAlbum !== '') ? 'flex' : 'none';
        document.getElementById('tab-label').innerText = `총 ${filtered.length}장`;
        pcList.innerHTML = filtered.map(pc => createCardHTML(pc)).join('');
    }

    function createCardHTML(pc) {
        const isB = bookmarks.includes(pc.id);
        return `<div class="card-item" id="card-${pc.id}">
            <button class="card-bookmark-btn ${isB?'active':''}" onclick="toggleBookmark('${pc.id}')"><i class="${isB?'fas':'far'} fa-heart"></i></button>
            <div class="card-image-wrapper"><img src="${pc.imgUrl}" onclick="handlePcClick(event, '${pc.imgUrl}', '${pc.id}')"></div>
            <div class="card-name">${pc.name}</div>
        </div>`;
    }

    function handlePcClick(e, url, id) {
        const now = new Date().getTime();
        if (now - lastTapTime < 300 && now - lastTapTime > 0) goToCard(id);
        else openModal(url, id);
        lastTapTime = now;
    }

    function handleModalImgClick(e) {
        e.stopPropagation();
        const now = new Date().getTime();
        if (now - lastModalTapTime < 300 && now - lastModalTapTime > 0) {
            if (currentViewingId) goToCard(currentViewingId);
        }
        lastModalTapTime = now;
    }

    function openModal(url, id) {
        const pc = pcData.find(p => p.id === id);
        currentViewingId = id;
        document.getElementById('modal-img').src = url;
        document.getElementById('modal-pc-name').innerText = pc ? pc.name : "";
        document.getElementById('image-modal').style.display = "flex";
        document.body.classList.add('menu-open');
        updateModalUI();
        document.getElementById('modal-bookmark-btn').onclick = (e) => { e.stopPropagation(); toggleBookmark(id); updateModalUI(); };
    }

    function updateModalUI() {
        const btn = document.getElementById('modal-bookmark-btn');
        const isB = bookmarks.includes(currentViewingId);
        btn.innerHTML = isB ? `<i class="fas fa-heart"></i>` : `<i class="far fa-heart"></i>`;
        btn.classList.toggle('active', isB);
    }

    function closeModal(e) {
        if (e && e.stopPropagation) e.stopPropagation();
        document.getElementById('image-modal').style.display = "none";
        document.body.classList.remove('menu-open');
    }

    function resetSearch() {
        searchInput.value = '';
        document.getElementById('search-bar').style.display = 'none';
    }

    function closeMenu() {
        document.getElementById('toc-menu').style.display = 'none';
        document.body.classList.remove('menu-open');
    }

    function goToCard(id) {
        const pc = pcData.find(p => p.id === id);
        if (!pc) return;
        closeModal();
        closeMenu();
        resetSearch(); 
        currentAlbum = pc.album;
        currentTab = pc.category;
        currentVer = pc.version || '전체';
        currentFsType = pc.fsType || '전체';
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        renderTabs(); 
        renderCards();
        setTimeout(() => {
            const target = document.getElementById(`card-${id}`);
            if (target) {
                const headerOffset = 70;
                const offsetPosition = target.getBoundingClientRect().top + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                target.classList.add('highlight-card');
                setTimeout(() => target.classList.remove('highlight-card'), 2000);
            }
        }, 300);
    }

    function renderTabs() {
        let tabs = ['전체'];
        const find = menuStructure.find(m => m.name === currentAlbum);
        if (find) tabs = tabs.concat(find.children);
        document.getElementById('tab-wrapper').innerHTML = tabs.map(t => `<button class="tab-btn ${currentTab===t?'active':''}" onclick="changeTab(this, '${t}')">${t}</button>`).join('');
        
        const vFilter = document.getElementById('version-filter');
        const fFilter = document.getElementById('fansign-filter');
        vFilter.style.display = 'none'; fFilter.style.display = 'none';

        if (searchInput.value.trim() === '') {
            if (currentTab.includes('앨범') && (currentAlbum === 'The Chase' || currentAlbum === 'FOCUS')) {
                vFilter.style.display = 'block';
                let vers = ['전체'];
                if (currentAlbum === 'The Chase') vers.push('Photobook Ver.', 'Package Ver.', 'Minibook Ver.');
                else vers.push('Rule Book Ver.', 'PhotoBook Ver.', 'Heart Locket Ver.', 'SMini Ver.');
                document.getElementById('version-btn-wrapper').innerHTML = vers.map(v => `<button class="f-btn ${v===currentVer?'active':''}" onclick="currentVer='${v}'; renderCards(); renderTabs();">${v}</button>`).join('');
            } else if (currentTab.includes('팬싸') && ['The Chase', 'STYLE', 'FOCUS'].includes(currentAlbum)) {
                fFilter.style.display = 'block';
                document.getElementById('fansign-btn-wrapper').innerHTML = ['전체', '대면', '영통'].map(t => `<button class="f-btn ${t===currentFsType?'active':''}" onclick="currentFsType='${t}'; renderCards(); renderTabs();">${t}</button>`).join('');
            }
        }
    }

    function changeTab(el, cat) {
        resetSearch(); 
        currentTab = cat; currentVer = '전체'; currentFsType = '전체';
        renderTabs(); renderCards();
    }

    function toggleBookmark(id) {
        const idx = bookmarks.indexOf(id);
        if (idx > -1) bookmarks.splice(idx, 1); else bookmarks.push(id);
        localStorage.setItem('jiwoo_bookmarks', JSON.stringify(bookmarks));
        if (document.getElementById('display-album-name').innerText === "내 북마크") showBookmarks();
        else renderCards();
    }

    searchInput.addEventListener('input', () => {
        if (searchInput.value.trim() !== '') {
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
        }
        renderCards();
    });

    document.getElementById('search-toggle').onclick = () => {
        closeMenu(); 
        const bar = document.getElementById('search-bar');
        bar.style.display = 'block';
        searchInput.focus(); 
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        renderCards();
    };

    function showBookmarks() {
        resetSearch(); 
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('display-album-name').style.display = "block";
        document.getElementById('display-album-name').innerText = "내 북마크";
        document.getElementById('tab-wrapper').innerHTML = "";
        const data = pcData.filter(pc => bookmarks.includes(pc.id));
        pcList.innerHTML = data.map(pc => createCardHTML(pc)).join('');
        document.getElementById('tab-label').innerText = `총 ${data.length}장`;
        document.getElementById('grid-slider-container').style.display = 'flex';
    }

    function renderMenu() {
        document.getElementById('menu-list-container').innerHTML = menuStructure.map((p, i) => `
            <div class="menu-group">
                <div class="menu-parent-row">
                    <span class="menu-parent-text" onclick="closeMenu(); resetSearch(); currentAlbum='${p.name}'; currentTab='전체'; currentVer='전체'; currentFsType='전체'; document.getElementById('welcome-view').style.display='none'; document.getElementById('result-area').style.display='block'; renderTabs(); renderCards();">${p.name}</span>
                    ${p.children.length ? `<div class="toggle-btn" onclick="toggleSubMenu(this, ${i})"><i class="fas fa-chevron-down"></i></div>` : ''}
                </div>
                <ul class="menu-child-list" id="sub-${i}" style="display:none;">${p.children.map(c => `<li class="menu-child-item" onclick="closeMenu(); resetSearch(); currentAlbum='${p.name}'; currentTab='${c}'; currentVer='전체'; currentFsType='전체'; document.getElementById('welcome-view').style.display='none'; document.getElementById('result-area').style.display='block'; renderTabs(); renderCards();">${c}</li>`).join('')}</ul>
            </div>
        `).join('');
    }

    function toggleSubMenu(btn, index) {
        const submenu = document.getElementById(`sub-${index}`);
        submenu.style.display = (submenu.style.display === 'flex') ? 'none' : 'flex';
        btn.classList.toggle('active');
    }

    document.getElementById('menu-toggle').onclick = () => {
        const m = document.getElementById('toc-menu');
        if (m.style.display === 'block') {
            closeMenu();
        } else {
            resetSearch(); 
            m.style.display = 'block';
            document.body.classList.add('menu-open'); 
        }
    };

    gridRange.addEventListener('input', (e) => {
        document.documentElement.style.setProperty('--grid-cols', e.target.value);
        if(e.target.value >= 3) pcList.classList.add('grid-3-plus');
        else pcList.classList.remove('grid-3-plus');
    });

    renderMenu();
</script>
